<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>关于 - OldChat for Kivotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('/static/KivotosBg2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        
        .about-card {
            background: white;
            padding: 2rem 2rem 2.2rem 2rem;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 500px;
            transition: all 0.2s ease;
        }

        
        .about-card h1 {
            margin: 0 0 0.35rem 0;
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            color: #1f2a3e;
        }

        
        .greeting {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #5a6874;
            margin-bottom: 1.8rem;
            border-left: 3px solid #b0c4de;
            padding-left: 12px;
            font-weight: 400;
        }

        .greeting-text {
            flex: 1;
            line-height: 1.4;
        }

        
        .about-section {
            margin: 1.2rem 0 1.5rem 0;
        }

        .info-panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid #e9edf2;
            transition: all 0.1s ease;
        }

        .info-panel h3 {
            font-size: 1.1rem;
            font-weight: 550;
            color: #1f2a3e;
            margin-bottom: 0.65rem;
            letter-spacing: -0.2px;
        }

        .info-panel p {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }       

        
        .divider-light {
            height: 1px;
            background: #e2e8f0;
            margin: 1rem 0;
        }

        
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px 16px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
            text-decoration: none;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .back-button:hover {
            background: #106ebe;
        }

        .back-button:active {
            transform: scale(0.98);
        }

        .extra-note {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #94a3b8;
            border-top: 1px solid #eaedf0;
            padding-top: 1rem;
        }

        @media (max-width: 480px) {
            .about-card {
                padding: 1.6rem 1.5rem 1.9rem;
            }
            .about-card h1 {
                font-size: 1.6rem;
            }
            .arona-avatar {
                width: 36px;
                height: 36px;
            }
            .info-panel {
                padding: 0.9rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="about-card">
    <h1>OldChat for Kivotos</h1>
    <div class="greeting">

        <span class="greeting-text">Sensei，欢迎来到关于页面</span>
    </div>

    <div class="about-section">
        <div class="info-panel">
            <h3>项目介绍</h3>
            <p>「OldChat for Kivotos」是专门为基沃托斯打造的特殊 OldChat 版本，使 Sensei 们也能获得最好的体验。</p>
        </div>

        <div class="info-panel">
            <h3>作者</h3>
            <p>LGCR837</p>
        </div>

        <div class="info-panel">
            <h3>技术构成</h3>
            <p>前端: HTML+CSS+JS<br>后端: Python+Flask+Waitress</p>
        </div>

        <div class="info-panel">
            <h3>项目地址</h3>
            <p><a href="https://codeberg.org/lgcr837/oldchat-kivotos">https://codeberg.org/lgcr837/oldchat-kivotos</a></p>
        </div>
    </div>

    <button class="back-button" id="backToRootBtn">重返基沃托斯</button>

    <div class="extra-note">
        Sensei，我们永远等你回来
    </div>
</div>

<script>
    const backBtn = document.getElementById('backToRootBtn');
    if (backBtn) {
        backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/';
        });
    }

</script>
</body>
</html>
