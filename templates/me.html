<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - OldChat for Kivotos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='space.css') }}">
    <style>
        .action-section {
            margin-top: 1.5rem;
        }
        .action-section h3 {
            font-size: 1rem;
            font-weight: 550;
            color: #1f2a3e;
            margin-bottom: 0.6rem;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .input-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .list-item button {
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .list-item button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="space-card">
        <!-- 基本资料 -->
        <div class="profile-header">
            <img class="profile-avatar" id="myAvatar" src="{{ url_for('static', filename='default-avatar.png') }}" alt="头像">
            <div class="profile-names">
                <h1 id="myName">加载中...</h1>
                <p class="text-secondary" id="myUid">UID: --</p>
            </div>
        </div>
        <div class="divider"></div>

        <!-- 动态发布 -->
        <div class="action-section">
            <h3>发布动态</h3>
            <textarea id="momentInput" rows="2" placeholder="说点什么吧..." style="width:100%; padding:8px; border-radius:8px; border:1px solid #e0e0e0; font-family:inherit; resize:vertical;"></textarea>
            <button class="back-button" id="postMomentBtn" style="margin-top:8px;">发布</button>
        </div>

        <div class="divider"></div>

        <!-- 好友列表 -->
        <div class="action-section">
            <h3>好友列表</h3>
            <div id="friendList">加载中...</div>
            <div class="input-row" style="margin-top:12px;">
                <input type="text" id="addFriendUid" placeholder="输入对方 UID">
                <button class="back-button" id="addFriendBtn" style="width:auto; padding:8px 16px;">添加好友</button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 群组列表 -->
        <div class="action-section">
            <h3>群组列表</h3>
            <div id="groupList">加载中...</div>
            <div class="input-row" style="margin-top:12px;">
                <input type="text" id="joinGroupId" placeholder="输入群组 ID">
                <button class="back-button" id="joinGroupBtn" style="width:auto; padding:8px 16px;">加入群聊</button>
            </div>
        </div>

        <!-- 好友申请列表 -->
        <div class="action-section">
            <h3>好友申请</h3>
            <div id="friendRequestsList">加载中...</div>
        </div>
        <div class="divider"></div>

        <button class="back-button" onclick="window.location.href='/'">返回聊天</button>
        <div class="extra-note">OldChat for Kivotos</div>
    </div>

    <script>
        // 加载个人资料
        fetch('/api/me').then(r => r.json()).then(data => {
            if (data.error) return;
            document.getElementById('myName').textContent = data.display_name || data.username || data.uid;
            document.getElementById('myUid').textContent = 'UID: ' + (data.uid || '');
            if (data.avatar_url) {
                document.getElementById('myAvatar').src = data.avatar_url;
            }
        });

        // 加载好友
        function loadFriends() {
            fetch('/api/contacts').then(r => r.json()).then(data => {
                const list = document.getElementById('friendList');
                if (!data.friends || data.friends.length === 0) {
                    list.innerHTML = '<p>暂无好友</p>';
                    return;
                }
                list.innerHTML = data.friends.map(f => `
                    <div class="list-item">
                        <span>${escapeHtml(f.name)} (${escapeHtml(f.uid)})</span>
                        <button onclick="deleteFriend('${f.uid}')">删除</button>
                    </div>
                `).join('');
            });
        }
        loadFriends();

        function loadFriendRequests() {
            fetch('/api/friend_requests')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('friendRequestsList');
                    if (data.error || !data.requests || data.requests.length === 0) {
                        list.innerHTML = '<p>暂无申请</p>';
                        return;
                    }
                    list.innerHTML = data.requests.map(req => `
                        <div class="list-item">
                            <span>${escapeHtml(req.from_display_name || req.from_username || req.from_uid)} (${escapeHtml(req.from_uid)})</span>
                            <span style="margin-left: auto; display: flex; gap: 5px;">
                                <button onclick="respondRequest('${req.id}', true)">同意</button>
                                <button onclick="respondRequest('${req.id}', false)">拒绝</button>
                            </span>
                        </div>
                    `).join('');
                });
        }
        loadFriendRequests();

        function respondRequest(requestId, accept) {
            fetch('/api/friend_respond', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({request_id: requestId, accept: accept})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else {
                    loadFriendRequests();
                    loadFriends(); // 同时刷新好友列表
                }
            });
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(text));
            return d.innerHTML;
        }

        function deleteFriend(uid) {
            if (!confirm('确定删除好友吗？')) return;
            // 尝试使用可能的删除接口，如果无效可注释掉
            fetch('/api/friends/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({uid: uid})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else loadFriends();
            }).catch(e => alert('删除失败'));
        }

        // 添加好友
        document.getElementById('addFriendBtn').addEventListener('click', () => {
            const uid = document.getElementById('addFriendUid').value.trim();
            if (!uid) return alert('请输入UID');
            fetch('/api/friends/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({to_uid: uid})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else { alert('好友请求已发送'); loadFriends(); }
            });
        });

        // 加载群组
        function loadGroups() {
            fetch('/api/contacts').then(r => r.json()).then(data => {
                const list = document.getElementById('groupList');
                if (!data.groups || data.groups.length === 0) {
                    list.innerHTML = '<p>暂无群聊</p>';
                    return;
                }
                list.innerHTML = data.groups.map(g => `
                    <div class="list-item">
                        <span>${escapeHtml(g.name)} (${escapeHtml(g.id)})</span>
                        <button onclick="leaveGroup('${g.id}')">退出</button>
                    </div>
                `).join('');
            });
        }
        loadGroups();

        function leaveGroup(gid) {
            if (!confirm('确定退出该群吗？')) return;
            fetch('/api/groups/leave', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group_id: gid})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else loadGroups();
            });
        }

        document.getElementById('joinGroupBtn').addEventListener('click', () => {
            const gid = document.getElementById('joinGroupId').value.trim();
            if (!gid) return alert('请输入群ID');
            fetch('/api/groups/join', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group_id: gid})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else { alert('已加入（或已发送申请）'); loadGroups(); }
            });
        });

        // 发布动态
        document.getElementById('postMomentBtn').addEventListener('click', () => {
            const body = document.getElementById('momentInput').value.trim();
            if (!body) return alert('请输入内容');
            fetch('/api/moments/post', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({body: body})
            }).then(r => r.json()).then(res => {
                if (res.error) alert(res.error);
                else {
                    alert('发布成功');
                    document.getElementById('momentInput').value = '';
                }
            });
        });
    </script>
</body>
</html>
